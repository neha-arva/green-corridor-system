<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Driver Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<div class="dashboard">

<header>

<h1>🚑 Driver Dashboard</h1>

<a href="/">← Home</a>

</header>
<div class="top-buttons">

    <button onclick="notifyPolice()">
        📢 Notify Police
    </button>

    <button onclick="reroute()">
        🔄 Reroute
    </button>
<hr>


</div>
<div class="info">

<div class="info-card">

<h3>Status</h3>

<p>Driving</p>

</div>

<div class="info-card">

<h3>ETA</h3>

<p id="eta">Loading...</p>

</div>

<div class="info-card">

<h3>Distance</h3>

<p id="distance">Loading...</p>

</div>

</div>
<div class="main-content">
<div id="map"></div>
<div class="controls">

    <h2>🚦 Upcoming Signal</h2>

    <table>

        <tr>
            <td><strong>Signal</strong></td>
            <td id="nextSignal">Signal 1</td>
        </tr>

        <tr>
            <td><strong>Status</strong></td>
            <td id="signalStatus">🔴 RED</td>
        </tr>

        <tr>
            <td><strong>Distance</strong></td>
            <td id="signalDistance">500 m</td>
        </tr>

        <tr>
            <td><strong>ETA</strong></td>
            <td id="signalETA">25 sec</td>
        </tr>

    </table>

    <br>

    <h2>🩺 Patient Details</h2>

<label>Patient Name</label><br>
<input type="text" id="patientNameInput" placeholder="Enter patient name"><br><br>

<label>Age</label><br>
<input type="number" id="patientAgeInput" placeholder="Enter age"><br><br>

<label>Blood Group</label><br>
<select id="bloodGroupInput">
    <option value="">Select Blood Group</option>
    <option>A+</option>
    <option>A-</option>
    <option>B+</option>
    <option>B-</option>
    <option>AB+</option>
    <option>AB-</option>
    <option>O+</option>
    <option>O-</option>
</select><br><br>

<label>Emergency Priority</label><br>
<select id="priorityInput">
    <option value="">Select Priority</option>
    <option>Critical</option>
    <option>High</option>
    <option>Moderate</option>
    <option>Low</option>
</select><br><br>

<label>Medical Condition</label><br>
<input type="text"
       id="conditionInput"
       placeholder="e.g. Cardiac Arrest, Stroke, Trauma"><br><br>

<label>Patient Status</label><br>
<select id="patientStatusInput">
    <option value="">Select Status</option>
    <option>Conscious</option>
    <option>Unconscious</option>
    <option>Stable</option>
    <option>Critical</option>
</select><br><br>

<label>Heart Rate (bpm)</label><br>
<input type="number" id="heartRateInput" placeholder="e.g. 86"><br><br>

<label>SpO₂ (%)</label><br>
<input type="number" id="spo2Input" placeholder="e.g. 98"><br><br>

<label>Blood Pressure (mmHg)</label><br>
<input type="text" id="bpInput" placeholder="e.g. 120 / 80"><br><br>

<label>Temperature (°C)</label><br>
<input type="number" step="0.1" id="tempInput" placeholder="e.g. 37.1"><br><br>

<button id="sendPatientBtn">
    📤 Send to Hospital
</button>

</div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="{{ url_for('static', filename='js/driver.js') }}"></script>

</body>

</html>
